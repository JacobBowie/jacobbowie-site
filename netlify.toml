# Netlify build configuration for the jacobbowie.com Quarto site.
#
# The @quarto/netlify-plugin-quarto plugin installs Quarto AND runs
# `quarto render` itself in its onBuild step. Do NOT set
# `build.command = "quarto render"` — that runs before the plugin's
# onBuild, so Quarto isn't on PATH yet (exit 127, "command not found").
#
# Do NOT add QUARTO_VERSION to [build.environment] — it triggers an
# onPreBuild IPC clone error (plugin issue #4). The plugin uses latest
# Quarto by default.

[build]
  publish = "_site"

[[plugins]]
  package = "@quarto/netlify-plugin-quarto"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
