# Netlify build configuration for the jacobbowie.com Quarto site.
#
# Quarto is installed inline via the official tarball release because
# @quarto/netlify-plugin-quarto has been unreliable on the noble image.
# This approach has no third-party plugin dependency and the build log
# tells us exactly what's happening at each step.

[build]
  publish = "_site"
  command = """
    set -euxo pipefail && \
    QUARTO_VERSION=1.5.57 && \
    curl -fsSL "https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz" -o quarto.tar.gz && \
    tar -xzf quarto.tar.gz && \
    export PATH="$PWD/quarto-${QUARTO_VERSION}/bin:$PATH" && \
    quarto --version && \
    quarto render
  """

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
