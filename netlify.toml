# Netlify build configuration for the jacobbowie.com Quarto site.
#
# Build flow: Netlify installs the @quarto/netlify-plugin-quarto plugin from
# package.json (devDependencies); the plugin installs Quarto into the build
# image; the explicit `command` below then runs the render. The pre-rendered
# _site/ tree is gitignored — Netlify regenerates it on every push.
#
# This site is pure-Markdown Quarto (no executable code), so there is no R or
# Python install required on CI; build time is ~30-60 seconds.

[build]
  publish = "_site"
  command = "quarto render"

[build.environment]
  QUARTO_VERSION = "1.9.37"

[[plugins]]
  package = "@quarto/netlify-plugin-quarto"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
