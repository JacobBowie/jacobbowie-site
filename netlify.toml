# Netlify build configuration for the jacobbowie.com Quarto site.
#
# v1 strategy: no build step on Netlify. The _site/ directory is
# rendered locally (via `quarto render`) and committed to git.
# Netlify just serves the static files. This avoids the unreliable
# @quarto/netlify-plugin-quarto (masks real errors behind a generic
# "Error message" string, and uses an Octokit call without
# GITHUB_TOKEN that hits anonymous rate limits).
#
# Workflow for content changes:
#   1. Edit .qmd source files
#   2. quarto render          # regenerate _site/
#   3. git add . && git commit && git push
#
# For Option B (week-of-5/18+), revisit with a proper build pipeline.

[build]
  publish = "_site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
