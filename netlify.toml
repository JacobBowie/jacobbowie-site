# Netlify build configuration for jacobbowie.com (Path A — inline Quarto
# install). Netlify downloads the Quarto release tarball into /tmp/quarto/
# and renders on every push. No build plugin (@quarto/netlify-plugin-quarto
# is abandoned per audit 2026-05-11), no committed _site/, no Netlify CLI.
#
# Tested against Netlify Build v35 on the `noble` image (Ubuntu 24.04) in
# the test/quarto-deploy-experiments branch — 4/4 inline-tarball variants
# succeeded in 16-32s.
#
# CRITICAL: extract to /tmp/quarto/, NOT to repo root. If the tarball
# extracts into the project tree, `quarto render` walks the project and
# trips on template .qmd files inside share/create/extensions/shortcode/.
# Verified failure mode 2026-05-11.

[build]
  publish = "_site"
  command = """
    set -e
    QUARTO_VERSION="1.9.37"
    mkdir -p /tmp/quarto
    curl -sSL "https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz" \
      | tar -xz -C /tmp/quarto --strip-components=1
    /tmp/quarto/bin/quarto --version

    # Pull the citation-network release artifacts before Quarto renders so
    # they get copied through to _site/ via the project's resources: glob.
    CN_TAG="v0.1.0"
    mkdir -p citation-network/interactive citation-network/notebook citation-network/assets
    curl -sSL "https://github.com/JacobBowie/citation-network/releases/download/${CN_TAG}/citation-network-standalone.tar.gz" \
      | tar -xz -C citation-network/interactive
    curl -sSL "https://github.com/JacobBowie/citation-network/releases/download/${CN_TAG}/citation-network-wasm.tar.gz" \
      | tar -xz -C citation-network/notebook
    curl -sSL "https://github.com/JacobBowie/citation-network/releases/download/${CN_TAG}/citation_network.png" \
      -o citation-network/assets/hero.png
    curl -sSL "https://github.com/JacobBowie/citation-network/releases/download/${CN_TAG}/citation_network_card.png" \
      -o citation-network/assets/og.png

    /tmp/quarto/bin/quarto render
  """

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# /citation-network embeds its own viz via iframe — override the site-wide
# DENY so same-origin iframes work.
[[headers]]
  for = "/citation-network/interactive/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/citation-network/notebook/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# The standalone tarball ships standalone.html (not index.html) so the
# WASM tarball can also ship its own index.html without conflict. Rewrite
# the bare /citation-network/interactive/ URL to standalone.html.
[[redirects]]
  from = "/citation-network/interactive"
  to   = "/citation-network/interactive/standalone.html"
  status = 200
  force = true

[[redirects]]
  from = "/citation-network/interactive/"
  to   = "/citation-network/interactive/standalone.html"
  status = 200
  force = true
