# Netlify build configuration for the jacobbowie.com Quarto site.
#
# Build flow: Netlify resolves @quarto/netlify-plugin-quarto from
# package.json (dependencies, not devDependencies — Netlify plugins must
# resolve from dependencies); the plugin installs Quarto into the build
# image and runs the render. The _site/ tree is gitignored — Netlify
# regenerates it on every build.
#
# Do NOT add QUARTO_VERSION to [build.environment] — it triggers an
# onPreBuild IPC clone error (plugin issue #4). The plugin uses latest
# Quarto by default.

[build]
  publish = "_site"
  command = "quarto render"

[[plugins]]
  package = "@quarto/netlify-plugin-quarto"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
