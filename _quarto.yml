project:
  type: website
  output-dir: _site

website:
  title: "Jacob Bowie, PhD"
  description: "Statistical analysis and machine learning for human physiology research."
  favicon: "favicon.svg"
  open-graph: true
  twitter-card: true
  site-url: "https://jacobbowie.com"
  page-navigation: false

format:
  html:
    theme: [cosmo, styles.scss]
    toc: false
    anchor-sections: false
    smooth-scroll: true
    fontsize: "1.05rem"
    linkcolor: "#3C5488"
    page-layout: article
    grid:
      body-width: 1000px
    include-in-header:
      text: |
        <meta property="og:url" content="https://jacobbowie.com/">
        <link rel="canonical" href="https://jacobbowie.com/">

execute:
  echo: false
  warning: false
  message: false
